<link rel="stylesheet" href="/core/nexia-theme.css">
<style>
:root{--bg:#0A0A0F;--bg2:#111118;--bg3:#1A1A2E;--brd:rgba(255,255,255,.07);--brd2:rgba(200,169,110,.25);--text:#F5F3EE;--text2:#9A9590;--text3:#5A5550;--accent:#C8A96E;--primary:#0A0A0F;--ff:'Inter',system-ui,sans-serif}
[data-theme="light"]{--bg:#F5F3EE;--bg2:#fff;--bg3:#ECEAE4;--brd:rgba(0,0,0,.08);--text:#0A0A0F;--text2:#4A4540;--text3:#9A9590}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);background:var(--bg);color:var(--text);min-height:100vh}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:8px;text-decoration:none}
.brand-icon{width:28px;height:28px;border-radius:7px;background:#0A0A0F;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:13px;font-weight:700}
.brand-name{font-size:13px;font-weight:700;color:var(--text)}.brand-name span{color:var(--accent)}
.spacer{flex:1}
.main{max-width:1200px;margin:0 auto;padding:32px 24px}
.page-header{margin-bottom:32px}
.page-title{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.02em;margin-bottom:8px}
.page-sub{font-size:14px;color:var(--text2)}
.demo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.demo-card{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;overflow:hidden;transition:.15s}
.demo-card:hover{border-color:var(--brd2);transform:translateY(-2px)}
.demo-preview{height:180px;background:linear-gradient(135deg,var(--primary),var(--bg3));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.demo-play{width:56px;height:56px;border-radius:50%;background:rgba(200,169,110,.2);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:24px;cursor:pointer;transition:.15s;z-index:1}
.demo-play:hover{background:rgba(200,169,110,.35);transform:scale(1.1)}
.demo-badge{position:absolute;top:12px;right:12px;background:var(--accent);color:#0A0A0F;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px}
.demo-body{padding:16px}
.demo-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.demo-cat{font-size:10px;font-weight:600;color:var(--accent);background:rgba(200,169,110,.1);padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:8px}
.demo-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:12px}
.demo-footer{display:flex;gap:8px}
.btn-watch{flex:1;padding:8px;background:#0A0A0F;color:var(--accent);border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-watch:hover{opacity:.85}
.btn-install{padding:8px 14px;background:var(--bg3);color:var(--text2);border:1px solid var(--brd);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px}
/* PLAYER MODAL */
.player-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column}
.player-overlay.open{display:flex}
.player-box{background:var(--bg2);border:1px solid var(--brd2);border-radius:14px;width:90%;max-width:800px;overflow:hidden}
.player-header{padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--brd)}
.player-title{font-size:15px;font-weight:600;color:var(--text);flex:1}
.player-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--brd);background:none;color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.player-screen{height:400px;background:#000;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.player-content{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
/* Demo animada */
.demo-anim{width:100%;height:100%;background:linear-gradient(135deg,#0A0A0F,#1A1A2E);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:16px}
.anim-title{font-size:22px;font-weight:700;color:var(--accent);text-align:center;opacity:0;animation:fadeIn .5s .3s forwards}
.anim-steps{display:flex;flex-direction:column;gap:10px;width:100%;max-width:500px}
.anim-step{background:rgba(200,169,110,.05);border:1px solid rgba(200,169,110,.15);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:10px;opacity:0}
.anim-step.s1{animation:slideIn .4s .6s forwards}
.anim-step.s2{animation:slideIn .4s 1.0s forwards}
.anim-step.s3{animation:slideIn .4s 1.4s forwards}
.anim-step.s4{animation:slideIn .4s 1.8s forwards}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#0A0A0F;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-txt{font-size:13px;color:var(--text2)}
.anim-cta{margin-top:8px;padding:10px 24px;background:var(--accent);color:#0A0A0F;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;opacity:0;animation:fadeIn .5s 2.4s forwards}
@keyframes fadeIn{to{opacity:1}}
@keyframes slideIn{to{opacity:1;transform:translateX(0)}}
.anim-step{transform:translateX(-20px)}

/* === MOBILE OVERFLOW FIX v12 === */
@media(max-width:768px){
  html,body{overflow-x:hidden!important;max-width:100vw!important}
  *{max-width:100%}
  img,video,iframe{max-width:100%!important;height:auto}
  pre,code{overflow-x:auto;white-space:pre-wrap;word-break:break-word}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  [class*="container"],[class*="wrap"],[class*="inner"]{max-width:100vw!important;padding-left:16px!important;padding-right:16px!important}
  nav,header{padding-left:16px!important;padding-right:16px!important;max-width:100vw!important}
  section,.sec{padding-left:16px!important;padding-right:16px!important;max-width:100vw!important;overflow:hidden!important}
}

</style>

<script>
/* === NEXIA Firebase Resilience v12 === */
(function(){
  var _origError = console.error.bind(console);
  console.error = function() {
    var msg = Array.prototype.join.call(arguments, ' ');
    if (msg.indexOf('Could not reach Cloud Firestore') !== -1 ||
        msg.indexOf('offline mode') !== -1 ||
        msg.indexOf('ERR_SOCKET_NOT_CONNECTED') !== -1) {
      if (!document.getElementById('nx-offline-banner')) {
        var b = document.createElement('div');
        b.id = 'nx-offline-banner';
        b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#FF8C00;color:#000;font-size:11px;font-weight:700;text-align:center;padding:6px 16px;z-index:99999;letter-spacing:.05em';
        b.textContent = '\u26a0 Modo offline \u2014 reconectando...';
        document.body && document.body.appendChild(b);
        var retries = 0;
        var check = setInterval(function(){
          retries++;
          if (navigator.onLine || retries > 30) { b.remove(); clearInterval(check); }
        }, 2000);
      }
      return;
    }
    return _origError.apply(this, arguments);
  };
})();
</script>

<body>
<div class="topbar">
  <a class="brand" href="/nexia/my-panel"><div class="brand-icon">N</div><span class="brand-name">NEXIA <span>OS</span></span></a>
  <span style="color:var(--brd2);font-size:16px">/</span>
  <span style="font-size:13px;color:var(--text2)">AutoDemo</span>
  <div class="spacer"></div>
  <a href="/nexia/my-panel" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--brd);color:var(--text2);font-size:12px;text-decoration:none"><i class="ri-arrow-left-line"></i> Painel</a>
</div>

<div class="main">
  <div class="page-header">
    <div class="page-title">NEXIA AutoDemo</div>
    <div class="page-sub">Demonstrações automáticas de cada módulo. Veja o que cada um faz antes de ativar.</div>
  </div>

  <div class="demo-grid" id="demoGrid"></div>
</div>

<!-- PLAYER -->
<div class="player-overlay" id="playerOverlay">
  <div class="player-box">
    <div class="player-header">
      <span id="playerTitle" class="player-title"></span>
      <button class="player-close" onclick="closePlayer()"><i class="ri-close-line"></i></button>
    </div>
    <div class="player-screen">
      <div class="player-content" id="playerContent"></div>
    </div>
    <div style="padding:16px 20px;display:flex;gap:10px;border-top:1px solid var(--brd)">
      <button onclick="window.location.href='/nexia/nexia-store'" style="flex:1;padding:10px;background:#0A0A0F;color:var(--accent);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">
        <i class="ri-store-2-line"></i> Ativar este módulo
      </button>
      <button onclick="closePlayer()" style="padding:10px 16px;background:var(--bg3);border:1px solid var(--brd);color:var(--text2);border-radius:8px;font-size:13px;cursor:pointer">Fechar</button>
    </div>
  </div>
</div>

<script>
const DEMOS = [
  {id:'cortex-copilot',nome:'CORTEX Co-Pilot',cat:'IA',icon:'ri-robot-line',desc:'Assistente executivo com IA.',
   steps:['Usuário envia pergunta estratégica ao CORTEX','CORTEX analisa MRR, churn e dados do negócio','IA gera análise com recomendações específicas','Relatório salvo automaticamente no Firestore']},
  {id:'social-media-auto',nome:'Social Media Automático',cat:'Marketing',icon:'ri-instagram-line',desc:'IA posta conteúdo automaticamente.',
   steps:['Admin define nicho e tom de voz do negócio','IA gera 30 posts mensais com imagens e legendas','Posts agendados no Instagram, Facebook e LinkedIn','Analytics de engajamento em tempo real']},
  {id:'nexia-striker',nome:'NEXIA Striker',cat:'Vendas',icon:'ri-sword-line',desc:'Prospecção ativa com IA.',
   steps:['Sistema identifica leads quentes no CRM','IA personaliza sequência de abordagem por perfil','Envio automático via email, WhatsApp e LinkedIn','Dashboard de respostas e conversões em tempo real']},
  {id:'cortex-sdr',nome:'CORTEX SDR',cat:'IA',icon:'ri-phone-line',desc:'Qualificação automática de leads.',
   steps:['Lead preenche formulário no site','CORTEX analisa perfil e dá nota de 0 a 100','Leads quentes notificam vendedor em tempo real','IA agenda reunião automática se score > 70']},
  {id:'pabx-cloud',nome:'PABX IP Cloud',cat:'Comunicação',icon:'ri-phone-line',desc:'Telefonia VoIP no navegador.',
   steps:['Admin configura ramais em 3 minutos no painel','Equipe recebe e faz ligações pela aba do Chrome','Todas as chamadas gravadas e transcritas por IA','Relatório de produtividade por atendente em tempo real']},
  {id:'nexia-flow',nome:'NEXIA Flow',cat:'Automação',icon:'ri-flashlight-line',desc:'Automações low-code visuais.',
   steps:['Admin arrasta blocos de trigger e ação no canvas','Define: "Quando lead criar → enviar WhatsApp"','Fluxo ativa em tempo real sem nenhum código','Log completo de cada execução automática']},
  {id:'swarm-control',nome:'NEXIA Swarm',cat:'Automação',icon:'ri-robot-2-line',desc:'Agentes de IA em paralelo.',
   steps:['Admin aciona "Rodar Todos os Agentes"','QA Agent testa todas as rotas da plataforma','Security Agent verifica vulnerabilidades','Debug Agent corrige erros encontrados automaticamente']},
  {id:'autodev',nome:'CORTEX AutoDev',cat:'Automação',icon:'ri-code-s-slash-line',desc:'Cortex se auto-programa.',
   steps:['Admin diz: "Crie um módulo de agendamento"','CORTEX gera schema, backend e UI completos','Módulo aparece automaticamente na Store','Deploy feito via GitHub Actions em < 2 minutos']},
  {id:'nexia-studio',nome:'NEXIA Studio',cat:'Marketing',icon:'ri-quill-pen-line',desc:'Copywriter IA para sua marca.',
   steps:['Admin informa produto e tom de voz da marca','IA gera 10 variações de copy para Instagram','Admin aprova com 1 clique e agenda automaticamente','Relatório de melhores posts por engajamento']},
  {id:'nexia-autodemo',nome:'NEXIA AutoDemo',cat:'Conteúdo',icon:'ri-video-line',desc:'Demos automáticas de módulos.',
   steps:['Módulo é registrado na plataforma','AutoDemo gera roteiro de demonstração com IA','Animação interativa criada automaticamente','Demo disponível na Store para prospects verem antes de comprar']},
];

function renderDemos() {
  const grid = document.getElementById('demoGrid');
  grid.innerHTML = '';
}

function playDemo(id) {
  const demo = DEMOS.find(d => d.id === id);
  if (!demo) return;
  document.getElementById('playerTitle').textContent = `Demo: ${demo.nome}`;
  document.getElementById('playerContent').innerHTML = '';
  document.getElementById('playerOverlay').classList.add('open');
}

function closePlayer() {
  document.getElementById('playerOverlay').classList.remove('open');
  // Reset animations by recreating content
}

document.addEventListener('DOMContentLoaded', renderDemos);
document.getElementById('playerOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('playerOverlay')) closePlayer();
});
</script>
  <script src="/core/nexia-theme.js"></script>
