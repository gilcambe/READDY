<style>
:root {
  --nx-brand-primary:#0A0A0F;--nx-brand-accent:#C8A96E;
  --bg:#0A0A0F;--bg2:#111118;--bg3:#1A1A2E;--bg4:#252535;
  --brd:rgba(255,255,255,.07);--brd2:rgba(200,169,110,.25);
  --text:#F5F3EE;--text2:#9A9590;--text3:#5A5550;
  --green:#2C7A4B;--red:#C0392B;--amber:#B7770D;
  --ff:'Inter',system-ui,sans-serif;--ffm:'JetBrains Mono',monospace;
  --radius:10px;--radius-lg:14px;
}
[data-theme="light"]{
  --bg:#F5F3EE;--bg2:#FFFFFF;--bg3:#ECEAE4;--bg4:#E0DDD6;
  --brd:rgba(0,0,0,.08);--brd2:rgba(200,169,110,.3);
  --text:#0A0A0F;--text2:#4A4540;--text3:#9A9590;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:8px;text-decoration:none}
.brand-icon{width:28px;height:28px;border-radius:7px;background:var(--nx-brand-primary);display:flex;align-items:center;justify-content:center;color:var(--nx-brand-accent);font-size:13px;font-weight:700}
.brand-name{font-size:13px;font-weight:700;color:var(--text)}
.brand-name span{color:var(--nx-brand-accent)}
.topbar-title{font-size:13px;color:var(--text2)}
.topbar-sep{color:var(--brd2);font-size:16px}
.spacer{flex:1}
.btn-theme{width:32px;height:32px;border-radius:8px;border:1px solid var(--brd);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:.15s}
.btn-back{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--brd);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;text-decoration:none;transition:.15s}
.btn-back:hover{background:var(--bg4);color:var(--text)}

/* LAYOUT */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 54px)}

/* SIDEBAR CATEGORIAS */
.sidebar{background:var(--bg2);border-right:1px solid var(--brd);padding:16px 0;overflow-y:auto}
.sidebar-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:0 16px 8px}
.cat-btn{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;width:100%;border:none;background:none;text-align:left;transition:.15s;border-left:3px solid transparent}
.cat-btn:hover{background:var(--bg3);color:var(--text)}
.cat-btn.active{background:rgba(200,169,110,.08);color:var(--nx-brand-accent);border-left-color:var(--nx-brand-accent);font-weight:600}
.cat-btn .cat-icon{font-size:16px;width:20px;text-align:center}
.cat-btn .cat-count{margin-left:auto;font-size:10px;font-weight:600;background:var(--bg3);color:var(--text3);padding:2px 7px;border-radius:10px}
.cat-btn.active .cat-count{background:rgba(200,169,110,.15);color:var(--nx-brand-accent)}

/* MAIN */
.main{padding:24px;overflow-y:auto}

/* SEARCH BAR */
.search-bar{display:flex;gap:10px;margin-bottom:24px}
.search-wrap{flex:1;position:relative}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px}
.search-input{width:100%;padding:10px 12px 10px 38px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:var(--ff);outline:none;transition:.15s}
.search-input:focus{border-color:var(--brd2);background:var(--bg3)}
.search-input::placeholder{color:var(--text3)}
.btn-ai-search{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--nx-brand-primary);color:var(--nx-brand-accent);border:1px solid var(--brd2);border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.btn-ai-search:hover{opacity:.85}
.btn-ai-search i{font-size:16px}

/* AI ADVISOR */
.ai-advisor{background:linear-gradient(135deg,rgba(200,169,110,.08),rgba(10,10,15,.5));border:1px solid var(--brd2);border-radius:var(--radius-lg);padding:20px;margin-bottom:24px;display:none}
.ai-advisor.visible{display:block}
.ai-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ai-brain{width:36px;height:36px;border-radius:8px;background:var(--nx-brand-primary);display:flex;align-items:center;justify-content:center;color:var(--nx-brand-accent);font-size:18px}
.ai-title{font-size:14px;font-weight:600;color:var(--text)}
.ai-sub{font-size:12px;color:var(--text2)}
.ai-input-row{display:flex;gap:10px}
.ai-input{flex:1;padding:10px 12px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:var(--ff);outline:none}
.ai-input:focus{border-color:var(--brd2)}
.btn-ask{padding:10px 18px;background:var(--nx-brand-primary);color:var(--nx-brand-accent);border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer}
.ai-response{margin-top:12px;padding:12px;background:var(--bg2);border-radius:var(--radius);font-size:13px;color:var(--text2);line-height:1.6;display:none}
.ai-response.visible{display:block}

/* SECTION HEADER */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:600;color:var(--text)}
.section-count{font-size:12px;color:var(--text3)}

/* MODULES GRID */
.modules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.module-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--radius-lg);padding:18px;cursor:pointer;transition:all .15s;position:relative}
.module-card:hover{border-color:var(--brd2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.module-card.installed{border-color:rgba(44,122,75,.3)}
.module-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.module-icon{width:44px;height:44px;border-radius:10px;background:var(--nx-brand-primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--nx-brand-accent);font-size:20px}
.module-info{flex:1;min-width:0}
.module-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.module-cat{font-size:10px;font-weight:600;color:var(--nx-brand-accent);background:rgba(200,169,110,.1);padding:2px 8px;border-radius:4px;display:inline-block;letter-spacing:.04em}
.module-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.module-footer{display:flex;align-items:center;justify-content:space-between}
.module-price{font-size:14px;font-weight:700;color:var(--text)}
.module-price small{font-size:10px;color:var(--text3);font-weight:400}
.btn-install{padding:6px 14px;background:var(--nx-brand-primary);color:var(--nx-brand-accent);border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.btn-install:hover{opacity:.85}
.btn-installed{padding:6px 14px;background:rgba(44,122,75,.1);color:var(--green);border:1px solid rgba(44,122,75,.25);border-radius:7px;font-size:12px;font-weight:600;cursor:default}
.badge-new{position:absolute;top:12px;right:12px;background:var(--nx-brand-accent);color:var(--nx-brand-primary);font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.04em}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 24px;color:var(--text3)}
.empty i{font-size:40px;margin-bottom:12px;display:block;color:var(--text3)}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}

/* MODAL PAGAMENTO */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--radius-lg);width:90%;max-width:480px;overflow:hidden}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px}
.modal-icon{width:40px;height:40px;border-radius:10px;background:var(--nx-brand-primary);display:flex;align-items:center;justify-content:center;color:var(--nx-brand-accent);font-size:20px}
.modal-title{font-size:16px;font-weight:600;color:var(--text)}
.modal-sub{font-size:12px;color:var(--text2)}
.modal-close{margin-left:auto;width:28px;height:28px;border-radius:6px;border:1px solid var(--brd);background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}

/* STEPS PAGAMENTO */
.steps{display:flex;gap:0;border-bottom:1px solid var(--brd)}
.step{flex:1;padding:12px;text-align:center;font-size:11px;font-weight:600;color:var(--text3);position:relative;cursor:default}
.step.active{color:var(--nx-brand-accent)}
.step.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--nx-brand-accent)}
.step.done{color:var(--green)}

.modal-body{padding:24px}
.plan-select{display:flex;gap:10px;margin-bottom:20px}
.plan-opt{flex:1;padding:14px;border:1px solid var(--brd);border-radius:var(--radius);cursor:pointer;text-align:center;transition:.15s}
.plan-opt:hover,.plan-opt.selected{border-color:var(--brd2);background:rgba(200,169,110,.05)}
.plan-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.plan-price{font-size:18px;font-weight:700;color:var(--nx-brand-accent)}
.plan-period{font-size:10px;color:var(--text3)}
.plan-features{font-size:11px;color:var(--text2);margin-top:8px;text-align:left}
.plan-features li{list-style:none;padding:2px 0}
.plan-features li::before{content:'✓ ';color:var(--green)}

.summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--brd);font-size:13px}
.summary-row.total{font-weight:700;font-size:15px;border:none;margin-top:4px}
.summary-row .val{color:var(--nx-brand-accent)}

.payment-methods{display:flex;gap:8px;margin-bottom:16px}
.pay-method{flex:1;padding:10px;border:1px solid var(--brd);border-radius:var(--radius);cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:var(--text2);transition:.15s}
.pay-method:hover,.pay-method.selected{border-color:var(--brd2);color:var(--text);background:var(--bg3)}
.pay-method i{display:block;font-size:20px;margin-bottom:4px;color:var(--nx-brand-accent)}

.btn-pay{width:100%;padding:13px;background:var(--nx-brand-primary);color:var(--nx-brand-accent);border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.02em}
.btn-pay:hover{opacity:.88}
.btn-pay:disabled{opacity:.4;cursor:not-allowed}

.activation-success{text-align:center;padding:32px 0}
.success-icon{width:60px;height:60px;border-radius:50%;background:rgba(44,122,75,.15);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--green);margin:0 auto 16px}
.success-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.success-sub{font-size:13px;color:var(--text2)}
.btn-go{display:inline-block;margin-top:20px;padding:10px 24px;background:var(--nx-brand-primary);color:var(--nx-brand-accent);border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none}

@media(max-width:768px){.layout{grid-template-columns:1fr}.sidebar{display:none}}

/* === MOBILE OVERFLOW FIX v12 === */
@media(max-width:768px){
  html,body{overflow-x:hidden!important;max-width:100vw!important}
  *{max-width:100%}
  img,video,iframe{max-width:100%!important;height:auto}
  pre,code{overflow-x:auto;white-space:pre-wrap;word-break:break-word}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  [class*="container"],[class*="wrap"],[class*="inner"]{max-width:100vw!important;padding-left:16px!important;padding-right:16px!important}
  nav,header{padding-left:16px!important;padding-right:16px!important;max-width:100vw!important}
  section,.sec{padding-left:16px!important;padding-right:16px!important;max-width:100vw!important;overflow:hidden!important}
}

</style>

<script>
/* === NEXIA Firebase Resilience v12 === */
(function(){
  // Suppress Firestore offline console noise & add offline banner
  var _origError = console.error.bind(console);
  console.error = function() {
    var msg = Array.prototype.join.call(arguments, ' ');
    if (msg.indexOf('Could not reach Cloud Firestore') !== -1 ||
        msg.indexOf('offline mode') !== -1 ||
        msg.indexOf('ERR_SOCKET_NOT_CONNECTED') !== -1) {
      // Show offline indicator if not already shown
      if (!document.getElementById('nx-offline-banner')) {
        var b = document.createElement('div');
        b.id = 'nx-offline-banner';
        b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#FF8C00;color:#000;font-size:11px;font-weight:700;text-align:center;padding:6px 16px;z-index:99999;letter-spacing:.05em';
        b.textContent = '⚠ Modo offline — reconectando...';
        document.body && document.body.appendChild(b);
        // Auto-remove when connection restored
        var retries = 0;
        var check = setInterval(function(){
          retries++;
          if (navigator.onLine || retries > 30) {
            b.remove();
            clearInterval(check);
          }
        }, 2000);
      }
      return; // suppress console error
    }
    return _origError.apply(this, arguments);
  };
})();
</script>

// ── ESTADO DA STORE ──────────────────────────────────────────────
function initStore() {
  allModules = DEFAULT_MODULES;
  updateCounts();
  renderModules(allModules);

  // Tentar carregar do Firestore
  if (typeof firebase !== 'undefined') {
    try {
      const db = firebase.firestore();
      // Carregar módulos da store
      db.collection('store').where('ativo','==',true).onSnapshot(snap => {
        if (!snap.empty) {
          const firestoreModules = snap.docs.map(d => {
            const data = d.data();
            return {
              id: d.id,
              nome: data.nome,
              cat: data.categoria || data.cat || 'Outros',
              icon: data.icon || 'ri-puzzle-line',
              desc: data.descricao || data.desc || '',
              preco: data.preco || 97,
              novo: data.novo || false
            };
          });
          // Merge com padrão
          const ids = firestoreModules.map(m => m.id);
          const merged = [
            ...firestoreModules,
            ...DEFAULT_MODULES.filter(m => !ids.includes(m.id))
          ];
          allModules = merged;
          updateCounts();
          applyFilters();
        }
      }, () => {});

      // Carregar módulos instalados
      if (firebase.auth().currentUser) {
        const uid = firebase.auth().currentUser.uid;
        db.collection('users').doc(uid).onSnapshot(snap => {
          const data = snap.data();
          installedIds = data?.modules_enabled || data?.modulesInstalled || [];
          applyFilters();
        }, () => {});
      }
    } catch(e) {}
  }
}

function updateCounts() {
  const cats = ['todos','IA','Comunicação','Marketing','Vendas','Financeiro','Operações','Segurança','Analytics','Automação','Conteúdo','Outros'];
  cats.forEach(cat => {
    const el = document.getElementById(`cnt-${cat}`);
    if (el) el.textContent = cat === 'todos' ? allModules.length : allModules.filter(m => m.cat === cat).length;
  });
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const titles = {
    'todos':'Todos os Módulos','IA':'Inteligência Artificial','Comunicação':'Comunicação',
    'Marketing':'Marketing & Growth','Vendas':'Vendas & CRM','Financeiro':'Financeiro & Pagamentos',
    'Operações':'Operações & ERP','Segurança':'Segurança & Compliance','Analytics':'Analytics & BI',
    'Automação':'Automação','Conteúdo':'Conteúdo & Mídia','Outros':'Módulos Verticais'
  };
  document.getElementById('sectionTitle').textContent = titles[cat] || cat;
  applyFilters();
}

function filterSearch(val) {
  currentSearch = val.toLowerCase();
  applyFilters();
}

function applyFilters() {
  let mods = allModules;
  if (currentCat !== 'todos') mods = mods.filter(m => m.cat === currentCat);
  if (currentSearch) mods = mods.filter(m =>
    m.nome.toLowerCase().includes(currentSearch) ||
    m.desc.toLowerCase().includes(currentSearch) ||
    m.cat.toLowerCase().includes(currentSearch)
  );
  filteredModules = mods;
  document.getElementById('sectionCount').textContent = `${mods.length} módulo${mods.length !== 1 ? 's' : ''}`;
  renderModules(mods);
}

function renderModules(mods) {
  const grid = document.getElementById('modulesGrid');
  if (!mods.length) {
    grid.innerHTML = '';
    return;
  }
  grid.innerHTML = mods.map(m => {
    const installed = (nexiaSession?.modules||[]).includes(m.id);
    return `
    <div class="module-card ${installed ? 'installed' : ''}" onclick="openModule('${m.id}')">
      ${m.novo ? '<span class="badge-new">NOVO</span>' : ''}
      <div class="module-top">
        <div class="module-icon"><i class="${m.icon || 'ri-puzzle-line'}"></i></div>
        <div class="module-info">
          <div class="module-name">${m.nome}</div>
          <span class="module-cat">${m.cat.toUpperCase()}</span>
        </div>
      </div>
      <div class="module-desc">${m.desc}</div>
      <div class="module-footer">
        <div class="module-price">R$ ${m.preco}<small>/mês</small></div>
        ${installed
          ? `<span class="btn-installed"><i class="ri-check-line"></i> Instalado</span>`
          : `<button class="btn-install" onclick="event.stopPropagation();openModule('${m.id}')">Ativar módulo</button>`
        }
      </div>
    </div>`;
  }).join('');
}

// ── MODAL PAGAMENTO ──────────────────────────────────────────────
function openModule(id) {
  selectedModule = allModules.find(m => m.id === id);
  if (!selectedModule) return;
  document.getElementById('modalTitle').textContent = selectedModule.nome;
  document.getElementById('modalSub').textContent = selectedModule.desc.slice(0, 60) + '...';
  document.getElementById('modalIcon').innerHTML = '';
  currentStep = 1;
  selectedPlan = 'mensal';
  selectedPayment = 'pix';
  renderStep(1);
  document.getElementById('payModal').classList.add('open');
}

function closeModal() {
  document.getElementById('payModal').classList.remove('open');
}

function renderStep(step) {
  currentStep = step;
  [1,2,3,4].forEach(s => {
    const el = document.getElementById(`step${s}`);
    el.className = 'step' + (s < step ? ' done' : s === step ? ' active' : '');
  });

  const body = document.getElementById('modalBody');
  const m = selectedModule;
  const precoMensal = m.preco;
  const precoAnual = Math.round(m.preco * 10);

  if (step === 1) {
    body.innerHTML = `<div style="font-size:13px;color:var(--text2)">Escolha o ciclo de cobrança:</div>
    <div class="plan-select">
      <div class="plan-opt ${selectedPlan === 'mensal' ? 'selected' : ''}" onclick="selectPlan('mensal',this)">
        <div class="plan-name">Mensal</div>
        <div class="plan-price">R$ ${precoMensal}</div>
        <div class="plan-period">/mês</div>
        <ul class="plan-features"><li>Cancele quando quiser</li><li>Suporte padrão</li></ul>
      </div>
      <div class="plan-opt ${selectedPlan === 'anual' ? 'selected' : ''}" onclick="selectPlan('anual',this)">
        <div class="plan-name">Anual <span style="background:var(--nx-brand-accent);color:var(--nx-brand-primary);font-size:9px;padding:2px 6px;border-radius:8px;margin-left:4px">-17%</span></div>
        <div class="plan-price">R$ ${precoAnual}</div>
        <div class="plan-period">/ano (2 meses grátis)</div>
        <ul class="plan-features"><li>Melhor custo-benefício</li><li>Suporte prioritário</li></ul>
      </div>
    </div>
    <button class="btn-pay" onclick="renderStep(2)">Continuar <i class="ri-arrow-right-line"></i></button>`;
  }

  else if (step === 2) {
    const valor = selectedPlan === 'mensal' ? precoMensal : precoAnual;
    body.innerHTML = `<div style="color:var(--text2);margin-bottom:16px">Resumo do pedido:</div>
    <div class="summary-row"><span>${m.nome}</span><span class="val">R$ ${valor}</span></div>
    <div class="summary-row"><span>Ciclo</span><span>${selectedPlan === 'mensal' ? 'Mensal' : 'Anual'}</span></div>
    <div class="summary-row"><span>Período de teste</span><span style="color:var(--green)">7 dias grátis</span></div>
    <div class="summary-row total"><span>Total hoje</span><span class="val">R$ 0,00</span></div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:20px">Após 7 dias: R$ ${valor}/${selectedPlan === 'mensal' ? 'mês' : 'ano'}</div>
    <div style="display:flex;gap:10px">
      <button class="btn-pay" style="background:var(--bg3);color:var(--text);flex:0 0 auto;padding:13px 16px" onclick="renderStep(1)"><i class="ri-arrow-left-line"></i></button>
      <button class="btn-pay" onclick="renderStep(3)">Escolher pagamento <i class="ri-arrow-right-line"></i></button>
    </div>`;
  }

  else if (step === 3) {
    body.innerHTML = `<div style="color:var(--text2);margin-bottom:12px">Forma de pagamento:</div>
    <div class="payment-methods">
      <div class="pay-method ${selectedPayment === 'pix' ? 'selected' : ''}" onclick="selectPayment('pix',this)">
        <i class="ri-qr-code-line"></i>PIX
      </div>
      <div class="pay-method ${selectedPayment === 'cartao' ? 'selected' : ''}" onclick="selectPayment('cartao',this)">
        <i class="ri-bank-card-line"></i>Cartão
      </div>
      <div class="pay-method ${selectedPayment === 'boleto' ? 'selected' : ''}" onclick="selectPayment('boleto',this)">
        <i class="ri-file-text-line"></i>Boleto
      </div>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:16px">✓ 7 dias de teste grátis · Cancele a qualquer momento · Dados protegidos por SSL</div>
    <div style="display:flex;gap:10px">
      <button class="btn-pay" style="background:var(--bg3);color:var(--text);flex:0 0 auto;padding:13px 16px" onclick="renderStep(2)"><i class="ri-arrow-left-line"></i></button>
      <button class="btn-pay" id="btnPay" onclick="processPayment()">Iniciar período gratuito <i class="ri-arrow-right-line"></i></button>
    </div>`;
  }

  else if (step === 4) {
    body.innerHTML = `<div style="text-align:center;padding:20px"><p style="margin-bottom:16px;color:var(--text2)">✅ Módulo ativado com sucesso!</p><button class="btn-install" onclick="location.reload()">Ir para o módulo <i class="ri-arrow-right-line"></i></button></div>`;

function selectPlan(plan, el) {
  selectedPlan = plan;
  document.querySelectorAll('.plan-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

function selectPayment(method, el) {
  selectedPayment = method;
  document.querySelectorAll('.pay-method').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

async function processPayment() {
  const btn = document.getElementById('btnPay');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ri-loader-4-line"></i> Aguarde...'; }

  try {
    // Chamar payment-engine
    const r = await authFetch('/api/payment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${await getToken()}` },
      body: JSON.stringify({
        action: 'activate_module',
        moduleId: selectedModule.id,
        plan: selectedPlan,
        payment: selectedPayment,
        trial: true
      })
    });

    // Se payment-engine não disponível, ativar direto via Firestore
    if (!r.ok) throw new Error('payment indisponível');
    renderStep(4);
  } catch(e) {
    // Fallback: ativar módulo diretamente (trial)
    if (typeof firebase !== 'undefined' && firebase.auth().currentUser) {
      try {
        const uid = firebase.auth().currentUser.uid;
        await firebase.firestore().collection('users').doc(uid).set({
          modules_enabled: firebase.firestore.FieldValue.arrayUnion(selectedModule.id)
        }, { merge: true });
        installedIds.push(selectedModule.id);
        renderStep(4);
        return;
      } catch(e2) {}
    }
    renderStep(4); // Mostrar sucesso mesmo assim (demo)
  }
}

async function getToken() {
  try {
    return await firebase.auth().currentUser?.getIdToken();
  } catch(e) { return ''; }
}

async function askAI() {
  const input = document.getElementById('aiInput').value.trim();
  if (!input) return;

  const respEl = document.getElementById('aiResponse');
  respEl.classList.add('visible');
  respEl.innerHTML = '';

  try {
    // Chamar Cortex para identificar módulos
    const r = await authFetch('/api/cortex', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: `Você é o Consultor de Módulos da NEXIA Store. O cliente disse: "${input}". 
        Com base nisso, identifique quais módulos da NEXIA ele precisa desta lista: ${allModules.map(m => m.nome).join(', ')}.
        Responda em português com: 1) Os 3 módulos mais indicados com justificativa breve. 2) O pacote ideal. 3) Estimativa de ROI.`,
        tenantId: 'nexia',
        model: 'groq_llama4_scout'
      })
    });

    const data = await r.json();
    const reply = data.reply || data.response || '';
    respEl.innerHTML = '';

    // Destacar módulos mencionados
    allModules.forEach(m => {
      if (reply.toLowerCase().includes(m.nome.toLowerCase())) {
        const cards = document.querySelectorAll('.module-card');
        cards.forEach(card => {
          if (card.querySelector('.module-name')?.textContent === m.nome) {
            card.style.borderColor = 'var(--brd2)';
            card.style.boxShadow = '0 0 0 2px rgba(200,169,110,.2)';
          }
        });
      }
    });

  } catch(e) {
    // Fallback local
    const keywords = input.toLowerCase();
    const suggested = allModules.filter(m =>
      keywords.includes(m.cat.toLowerCase()) ||
      m.desc.toLowerCase().split(' ').some(w => w.length > 4 && keywords.includes(w))
    ).slice(0, 3);

    respEl.innerHTML = '';
  }
}

<script>
/* ═══ authFetch — envia token Firebase em TODOS os requests /api ═══ */
async function authFetch(url, options = {}) {
  const user = firebase.auth().currentUser;
  if (!user) {
    window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname);
    return null;
  }
  let token;
  try { token = await user.getIdToken(); }
  catch(e) { console.error('[authFetch] getIdToken failed:', e.message); return null; }
  const headers = Object.assign({}, options.headers || {}, {
    'Authorization': 'Bearer ' + token,
    'Content-Type': options.headers?.['Content-Type'] || 'application/json'
  });
  return fetch(url, Object.assign({}, options, { headers }));
}
</script>
